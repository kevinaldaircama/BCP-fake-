<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Iniciar sesión</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#01256f" />

<link rel="icon" type="images/png" href="images/app_icon_xxxhdpi.png">
<style>

*{
box-sizing:border-box;
font-family:Segoe UI;
margin:0;
padding:0;
}

body{
background:#f4f6fb;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{

width:95%;
max-width:380px;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.15);

}

h2{
text-align:center;
margin-bottom:20px;
color:#0033a0;
}

input{

width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-bottom:1px solid #aaa;

}

button{

width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#ff6600;
color:#fff;
font-size:16px;
margin-top:5px;

}

button.gray{
background:#bbb;
color:#000;
}

.link{

text-align:center;
margin-top:10px;
color:#0033a0;
cursor:pointer;
font-size:14px;

}


/* modal */

.modal{

display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;

}

.loader{

width:90px;
height:90px;
border:6px solid transparent;
border-top:6px solid #ff6600;
border-radius:50%;
animation:spin 1s linear infinite;

}

@keyframes spin{

0%{transform:rotate(0)}
100%{transform:rotate(360deg)}

}

.msg{

background:#fff;
padding:20px;
border-radius:10px;
text-align:center;
width:90%;
max-width:320px;

}

.msg button{
margin-top:10px;
}

</style>

</head>
<body>


<div class="card">

<h2>Iniciar sesión</h2>

<input id="correo" placeholder="Correo">

<input id="password" type="password" placeholder="Contraseña">

<button id="loginBtn">
Entrar
</button>

<div class="link" id="reenviar" style="display:none">
Reenviar verificación
</div>

<div class="link" id="olvide">
Olvidé mi contraseña
</div>

</div>



<div class="modal" id="loading">
<div class="loader"></div>
</div>



<div class="modal" id="msgModal">
<div class="msg">

<div id="msgText"></div>

<button id="ok">
OK
</button>

</div>
</div>



<div class="modal" id="resetModal">

<div class="msg">

<h3>Restablecer contraseña</h3>

<input id="resetCorreo" placeholder="Correo">

<button id="enviarReset">
Enviar enlace
</button>

<button id="cerrarReset" class="gray">
Cancelar
</button>

</div>

</div>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
sendEmailVerification,
sendPasswordResetEmail
}
from
"https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";


const firebaseConfig={
apiKey: "AIzaSyDuF8oL5UWaIXw_vt_HdAsiKC4I3irj8rM",
    authDomain: "bcpf-ba4cd.firebaseapp.com",
    databaseURL: "https://bcpf-ba4cd-default-rtdb.firebaseio.com",
    projectId: "bcpf-ba4cd",
    storageBucket: "bcpf-ba4cd.firebasestorage.app",
    messagingSenderId: "1073055247962",
    appId: "1:1073055247962:web:88f888730ee3577dcb7263",
    measurementId: "G-TCFHF3FMKQ"
};


const app=initializeApp(firebaseConfig);

const auth=getAuth(app);


const loading=document.getElementById("loading");

const msgModal=document.getElementById("msgModal");

const msgText=document.getElementById("msgText");

const reenviar=document.getElementById("reenviar");

const correoInput=document.getElementById("correo");

const passwordInput=document.getElementById("password");

const resetModal=document.getElementById("resetModal");

let currentUser=null;


function msg(t){

msgText.textContent=t;

msgModal.style.display="flex";

}

ok.onclick=()=>{

msgModal.style.display="none";

};



loginBtn.onclick=async()=>{

const correo=correoInput.value.trim();
const pass=passwordInput.value.trim();

if(!correo || !pass){

msg("Completa datos");
return;

}

loading.style.display="flex";

try{

const cred=await signInWithEmailAndPassword(
auth,
correo,
pass
);

const user=cred.user;

currentUser=user;

await user.reload();

if(!user.emailVerified){

loading.style.display="none";

msg("Debes verificar tu correo");

reenviar.style.display="block";

return;

}


loading.style.display="none";

msg("Bienvenido");

setTimeout(()=>{

window.location.href="panel.html";

},1000);


}catch(e){

loading.style.display="none";

msg(e.message);

}

};



reenviar.onclick=async()=>{

if(!currentUser){

msg("Inicia sesión primero");
return;

}

loading.style.display="flex";

await sendEmailVerification(currentUser);

loading.style.display="none";

msg("Correo enviado");

};



olvide.onclick=()=>{

resetModal.style.display="flex";

};


cerrarReset.onclick=()=>{

resetModal.style.display="none";

};


enviarReset.onclick=async()=>{

const correo=document
.getElementById("resetCorreo")
.value.trim();

if(!correo){

msg("Escribe el correo");
return;

}

loading.style.display="flex";

try{

await sendPasswordResetEmail(
auth,
correo
);

loading.style.display="none";

resetModal.style.display="none";

msg("Se envió el enlace");

}catch(e){

loading.style.display="none";

msg(e.message);

}

};


</script>

</body>
</html>
