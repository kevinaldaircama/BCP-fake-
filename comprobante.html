<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comprobante de Transferencia</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#01256f">
<link rel="icon" type="images/png" href="images/app_icon_xxxhdpi.png">
<style>
  * { box-sizing:border-box; margin:0; padding:0; font-family:Arial,sans-serif; }
  body { background:#fff; color:#333; }
  .container { max-width:400px; margin:0 auto; background:#fff; text-align:center; padding-top:25px; }
  .logo { width:90px; margin:0 auto 15px; display:block; }
  .title { font-size:18px; font-weight:600; margin-bottom:8px; color:#333; }
  .amount { font-size:32px; font-weight:600; color:#004b93; margin-bottom:10px; }
  .date { font-size:14px; color:#777; margin-bottom:20px; }
  .actions { display:flex; justify-content:center; gap:60px; margin-bottom:20px; }
  .action { display:flex; flex-direction:column; align-items:center; color:#ff7b00; font-size:14px; cursor:pointer; }
  .action img { width:24px; height:24px; margin-bottom:5px; }
  .details { text-align:left; padding:15px; font-size:14px; background:#fff; }
  .row { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
  .row strong { font-weight:bold; }
  .right-text { text-align:right; display:flex; flex-direction:column; align-items:flex-end; }
  .divider { border-top:1px solid #ddd; margin:10px 0; }
  .banner { width:95%; margin:15px auto; text-align:center; }
  .banner img { width:100%; max-width:380px; border-radius:8px; display:block; margin:0 auto; }
  .button { background:#ff7b00; color:#fff; border:none; border-radius:25px; font-size:16px; font-weight:bold; padding:12px 20px; width:90%; max-width:400px; margin:10px auto; display:block; cursor:pointer; text-decoration:none; text-align:center; }
  .link-inicio { display:block; text-align:center; margin-top:8px; font-size:14px; color:#004b93; text-decoration:none; }
  .link-inicio:hover { text-decoration:underline; }
</style>
</head>
<body>

<div id="comprobante" class="container">
  <img src="images/IMG_20251017_194447.jpg" alt="Logo" class="logo">
  <div class="title">¡Transferencia exitosa!</div>
  <div class="amount" id="comprobante-monto">S/ 0.00</div>
  <div class="date" id="fecha-actual"></div>

  <div class="actions">
    <div class="action" id="descargarBtn">
      <img src="images/descargar-icon.svg" alt="Descargar">
      <span>Descargar</span>
    </div>
    <div class="action" id="compartirBtn">
      <img src="images/compartir-cop.svg" alt="Compartir">
      <span>Compartir</span>
    </div>
  </div>
</div>

<div class="details">
  <div class="row">
    <strong>Enviado a</strong>
    <div class="right-text">
      <span id="comprobante-nombre">—</span>
      <span id="comprobante-cuenta">****</span>
      <span id="comprobante-destino">----</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="row">
    <strong>Desde</strong>
    <div class="right-text">
      <span>Cuenta Digital Soles</span>
      <span id="comprobante-origen">****</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="row">
    <strong>Número de operación</strong>
    <div class="right-text">
      <span id="comprobante-operacion">00000000</span>
    </div>
  </div>
</div>

<div class="banner">
  <img src="images/banner.jpg" alt="Banner pequeño">
</div>

<a href="yape" class="button">Realiza otro yapeo</a>
<a href="inicio" class="link-inicio">Ir al inicio</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  // Fecha y hora
  const fechaElemento = document.getElementById('fecha-actual');
  const ahora = new Date();
  const opciones = { weekday:'long', day:'numeric', month:'long', year:'numeric' };
  let horas = ahora.getHours();
  const minutos = ahora.getMinutes().toString().padStart(2,'0');
  const ampm = horas>=12?'pm':'am';
  horas = horas%12 || 12;
  fechaElemento.textContent = `${ahora.toLocaleDateString('es-ES', opciones)} - ${horas}:${minutos} ${ampm}`;

  // Datos
  const monto = localStorage.getItem('comprobante_monto') || "0.00";
  const destinatario = localStorage.getItem('comprobante_destinatario') || "—";
  const cuenta = localStorage.getItem('comprobante_cuenta') || "****";
  const destino = localStorage.getItem('destinoCuenta') || "----";
  const origen = localStorage.getItem('numeroCuenta') || "0000";
  const numeroOperacion = Math.floor(10000000 + Math.random()*90000000);

  document.getElementById('comprobante-monto').textContent = `S/ ${parseFloat(monto).toFixed(2)}`;
  document.getElementById('comprobante-nombre').textContent = destinatario;
  document.getElementById('comprobante-cuenta').textContent = cuenta;
  document.getElementById('comprobante-destino').textContent = destino;
  document.getElementById('comprobante-origen').textContent = "****"+origen;
  document.getElementById('comprobante-operacion').textContent = numeroOperacion;

  // Descargar y compartir como imagen
  const descargarBtn = document.getElementById('descargarBtn');
  const compartirBtn = document.getElementById('compartirBtn');

  function capturarImagen() {
    const elemento = document.body; // Puedes cambiar a '#comprobante' si quieres solo la sección
    return html2canvas(elemento, { scale:2 });
  }

  descargarBtn.addEventListener('click', ()=>{
    capturarImagen().then(canvas=>{
      const link=document.createElement('a');
      link.href=canvas.toDataURL('image/png');
      link.download=`comprobante_${Date.now()}.png`;
      link.click();
    });
  });

  compartirBtn.addEventListener('click', async ()=>{
    capturarImagen().then(canvas=>{
      canvas.toBlob(async blob=>{
        const file=new File([blob], `comprobante_${Date.now()}.png`, { type:'image/png' });
        if(navigator.canShare && navigator.canShare({ files:[file] })){
          try{ await navigator.share({ files:[file], title:'Comprobante de Transferencia' }); }
          catch(err){ console.error(err); alert('Error al compartir'); }
        } else alert('Tu navegador no soporta compartir archivos. Descárgalo.');
      });
    });
  });
</script>
</body>
</html>
